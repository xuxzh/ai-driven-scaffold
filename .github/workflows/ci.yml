# =============================================================
# 占位 GitHub Actions CI 模板
# -------------------------------------------------------------
# 用户需根据实际包管理器和运行时替换以下占位符：
#   <runtime-version> : 例如 "20", "3.12", "1.22"
#   <pm>             : 例如 pnpm, npm, yarn, uv, cargo, go, mix
#   <setup-action>   : 例如 actions/setup-node, actions/setup-python,
#                       actions/setup-go
#   <cache-key>      : 缓存键，例如 "${{ runner.os }}-node-${{ hashFiles('**/pnpm-lock.yaml') }}"
#   <cache-path>     : 缓存路径，例如 "~/.npm", ".venv", "~/.cargo"
# =============================================================

name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: <setup-action>@<runtime-version>
        with:
          cache: "<pm>"
      - run: <pm> install
      - run: <pm> lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: <setup-action>@<runtime-version>
        with:
          cache: "<pm>"
      - run: <pm> install
      - run: <pm> typecheck
      # 如项目无 typecheck，删除本 job

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: <setup-action>@<runtime-version>
        with:
          cache: "<pm>"
      - run: <pm> install
      - run: <pm> test
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: <setup-action>@<runtime-version>
        with:
          cache: "<pm>"
      - run: <pm> install
      - run: <pm> build

  # ---------- 端到端测试（如项目需要） ----------
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - uses: <setup-action>@<runtime-version>
        with:
          cache: "<pm>"
      - run: <pm> install
      - run: <pm> test:e2e
      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            test-results/
            playwright-report/
